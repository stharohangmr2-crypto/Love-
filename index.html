<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 For You</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink1: #ff6b9d;
    --pink2: #ff8fab;
    --pink3: #ffb3c6;
    --pink4: #ffd6e0;
    --pink5: #fff0f3;
    --deep: #c9184a;
    --gold: #f4a261;
    --cream: #fff9fb;
  }

  body {
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    background: linear-gradient(135deg, #ffe0eb 0%, #ffc2d4 30%, #ff85a1 60%, #ff4d6d 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Animated gradient background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,182,193,0.7) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(255,105,148,0.5) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,220,230,0.4) 0%, transparent 70%);
    animation: bgPulse 6s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes bgPulse {
    from { opacity: 0.7; }
    to   { opacity: 1; }
  }

  /* ── Floating petals / tulips background ── */
  .petals-bg {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .tulip {
    position: absolute;
    font-size: 2rem;
    opacity: 0.18;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 2px 4px rgba(201,24,74,0.3));
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.18; }
    90%  { opacity: 0.18; }
    100% { transform: translateY(-20vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  /* ── Sparkle stars ── */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparklePop ease-out forwards;
    z-index: 10;
    font-size: 1.2rem;
  }

  @keyframes sparklePop {
    0%   { transform: scale(0) rotate(0deg); opacity: 1; }
    50%  { transform: scale(1.4) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg) translateY(-40px); opacity: 0; }
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 5;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 32px;
    padding: 52px 48px 48px;
    max-width: 480px;
    width: 90vw;
    text-align: center;
    box-shadow:
      0 8px 40px rgba(201,24,74,0.18),
      0 2px 0 rgba(255,255,255,0.6) inset,
      0 -2px 0 rgba(255,105,148,0.2) inset;
  }

  /* ── Screen manager ── */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.6s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Tulip decoration on card ── */
  .tulip-row {
    font-size: 1.8rem;
    margin-bottom: 16px;
    letter-spacing: 6px;
    animation: sway 3s ease-in-out infinite alternate;
    display: block;
  }

  @keyframes sway {
    from { transform: rotate(-3deg); }
    to   { transform: rotate(3deg); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 2rem;
    color: var(--deep);
    margin-bottom: 8px;
    line-height: 1.2;
    text-shadow: 0 2px 12px rgba(201,24,74,0.15);
  }

  p.subtitle {
    font-size: 1rem;
    color: rgba(180,30,70,0.7);
    margin-bottom: 32px;
    letter-spacing: 0.05em;
  }

  /* ── Play Button ── */
  .play-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(145deg, #ff6b9d, #c9184a);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 10px;
    box-shadow:
      0 6px 24px rgba(201,24,74,0.4),
      0 0 0 10px rgba(255,107,157,0.15),
      0 0 0 20px rgba(255,107,157,0.07);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 6px 24px rgba(201,24,74,0.4), 0 0 0 10px rgba(255,107,157,0.15), 0 0 0 20px rgba(255,107,157,0.07); }
    50%       { box-shadow: 0 6px 32px rgba(201,24,74,0.6), 0 0 0 14px rgba(255,107,157,0.2),  0 0 0 28px rgba(255,107,157,0.1); }
  }

  .play-btn:hover { transform: scale(1.1); }
  .play-btn:active { transform: scale(0.95); }

  .play-btn svg { width: 32px; height: 32px; fill: white; margin-left: 4px; }

  .play-label {
    font-size: 0.85rem;
    color: rgba(180,30,70,0.6);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── Question screen ── */
  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem;
    font-style: italic;
    color: var(--deep);
    margin: 12px 0 32px;
    line-height: 1.4;
    text-shadow: 0 2px 10px rgba(201,24,74,0.12);
  }

  .btn-row {
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .choice-btn {
    flex: 1;
    max-width: 160px;
    padding: 14px 10px;
    border-radius: 50px;
    border: none;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .choice-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.2);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .choice-btn:hover::before { opacity: 1; }
  .choice-btn:hover { transform: translateY(-3px); }
  .choice-btn:active { transform: scale(0.96); }

  .yes-btn {
    background: linear-gradient(135deg, #ff6b9d, #c9184a);
    color: white;
    box-shadow: 0 6px 20px rgba(201,24,74,0.35);
  }

  .no-btn {
    background: rgba(255,255,255,0.4);
    color: var(--deep);
    border: 1.5px solid rgba(201,24,74,0.3);
    box-shadow: 0 4px 12px rgba(201,24,74,0.1);
    transition: transform 0.15s, left 0.3s, top 0.3s;
    position: relative;
  }

  /* ── Result screen ── */
  .result-emoji {
    font-size: 3.5rem;
    margin-bottom: 12px;
    display: block;
    animation: bounce 1s ease infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-10px) scale(1.1); }
  }

  .result-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-style: italic;
    color: var(--deep);
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .no-count-text {
    font-size: 0.95rem;
    color: rgba(180,30,70,0.65);
    margin-bottom: 24px;
    min-height: 24px;
  }

  .next-btn {
    background: linear-gradient(135deg, #ff6b9d, #c9184a);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(201,24,74,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .next-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(201,24,74,0.45); }
  .next-btn:active { transform: scale(0.96); }

  /* ── How much screen ── */
  .how-much-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-style: italic;
    color: var(--deep);
    margin: 8px 0 28px;
    line-height: 1.3;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    background: rgba(255,255,255,0.35);
    border: 1.5px solid rgba(255,107,157,0.4);
    border-radius: 16px;
    padding: 14px 20px;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--deep);
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover {
    background: rgba(255,107,157,0.25);
    border-color: var(--pink1);
    transform: translateX(6px);
    box-shadow: 0 4px 16px rgba(201,24,74,0.15);
  }

  .option-btn .letter {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--deep);
    background: rgba(255,107,157,0.2);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ── Final screen ── */
  .final-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 12px;
    animation: spin 1s ease-out forwards;
  }

  @keyframes spin {
    from { transform: rotate(-20deg) scale(0.5); opacity: 0; }
    to   { transform: rotate(0deg) scale(1); opacity: 1; }
  }

  .final-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-style: italic;
    color: var(--deep);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .final-sub {
    font-size: 1rem;
    color: rgba(180,30,70,0.65);
    line-height: 1.6;
  }

  /* ── Hearts floating on final ── */
  .heart-particle {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    font-size: 1.5rem;
    animation: heartFloat 3s ease-out forwards;
  }

  @keyframes heartFloat {
    0%   { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-90vh) scale(1.2) rotate(30deg); opacity: 0; }
  }

  /* ── Sad emoji scale ── */
  .sad-scale {
    font-size: 1.4rem;
    margin-bottom: 6px;
    transition: all 0.5s ease;
    display: block;
  }
</style>
</head>
<body>

<!-- Floating tulips background -->
<div class="petals-bg" id="petalsBg"></div>

<!-- CARD -->
<div class="card">

  <!-- Screen 1: Play -->
  <div class="screen active" id="screen-play">
    <span class="tulip-row">🌷🌸🌷🌸🌷</span>
    <h1>A little something<br>just for you</h1>
    <p class="subtitle">press play when you're ready 💕</p>
    <button class="play-btn" onclick="goToQuestion()" aria-label="Play">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <p class="play-label" style="margin-top:14px;">Play</p>
  </div>

  <!-- Screen 2: Question -->
  <div class="screen" id="screen-question">
    <span class="tulip-row">🌷🌷🌷</span>
    <p class="question-text" id="questionEmoji">💭</p>
    <p class="question-text">Do you love me?</p>
    <div class="btn-row">
      <button class="choice-btn yes-btn" onclick="clickYes(this)">Yes 💖</button>
      <button class="choice-btn no-btn" id="noBtn" onclick="clickNo()">No 🙈</button>
    </div>
  </div>

  <!-- Screen 3: Result -->
  <div class="screen" id="screen-result">
    <span class="sad-scale" id="sadScale">🥰</span>
    <p class="result-text" id="resultText">I knew you loved me! 💕</p>
    <p class="no-count-text" id="noCountText"></p>
    <button class="next-btn" onclick="goToHowMuch()">How much? 🌷</button>
  </div>

  <!-- Screen 4: How much -->
  <div class="screen" id="screen-howmuch">
    <span class="tulip-row">🌷💕🌷</span>
    <p class="how-much-title">How much do you love me?</p>
    <div class="options-list">
      <button class="option-btn" onclick="pickAnswer('A lot 🌸')"><span class="letter">A</span> A lot 🌸</button>
      <button class="option-btn" onclick="pickAnswer('Very much 💝')"><span class="letter">B</span> Very much 💝</button>
      <button class="option-btn" onclick="pickAnswer('Sooo much 🌷')"><span class="letter">C</span> Sooo much 🌷</button>
      <button class="option-btn" onclick="pickAnswer('All 🫶')"><span class="letter">D</span> All 🫶</button>
    </div>
  </div>

  <!-- Screen 5: Final -->
  <div class="screen" id="screen-final">
    <span class="final-emoji" id="finalEmoji">💞</span>
    <p class="final-text" id="finalText">You said it! 🌷</p>
    <p class="final-sub" id="finalSub">And I feel the same way — every single day. 💕</p>
  </div>

</div>

<script>
  let noCount = 0;

  // ── Generate floating tulips ──
  const emojis = ['🌷','🌸','💮','🌺','💐','🌹','🩷','💕'];
  const bg = document.getElementById('petalsBg');
  for (let i = 0; i < 28; i++) {
    const el = document.createElement('span');
    el.className = 'tulip';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (1.2 + Math.random() * 2.2) + 'rem';
    el.style.animationDuration = (8 + Math.random() * 14) + 's';
    el.style.animationDelay = (Math.random() * 12) + 's';
    bg.appendChild(el);
  }

  // ── Helpers ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function spawnSparkles(n = 8) {
    for (let i = 0; i < n; i++) {
      setTimeout(() => {
        const s = document.createElement('span');
        s.className = 'sparkle';
        s.textContent = ['✨','💖','🌷','💫','🩷'][Math.floor(Math.random()*5)];
        s.style.left = (10 + Math.random() * 80) + 'vw';
        s.style.top  = (10 + Math.random() * 70) + 'vh';
        s.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1500);
      }, i * 80);
    }
  }

  function spawnHearts() {
    for (let i = 0; i < 20; i++) {
      setTimeout(() => {
        const h = document.createElement('span');
        h.className = 'heart-particle';
        h.textContent = ['💖','💕','🌷','💝','🩷','💗'][Math.floor(Math.random()*6)];
        h.style.left  = (5 + Math.random() * 90) + 'vw';
        h.style.top   = '90vh';
        h.style.animationDuration = (2 + Math.random() * 2) + 's';
        h.style.animationDelay = (Math.random() * 1.5) + 's';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
      }, i * 100);
    }
  }

  // ── Navigation ──
  function goToQuestion() {
    spawnSparkles(6);
    showScreen('screen-question');
  }

  function getSadEmoji(n) {
    if (n === 0) return '🥰';
    if (n === 1) return '🥺';
    if (n === 2) return '😢';
    if (n === 3) return '😭';
    if (n === 4) return '💔';
    return '😭💔';
  }

  function clickNo() {
    noCount++;
    // Wiggle the no button away
    const btn = document.getElementById('noBtn');
    const maxX = window.innerWidth * 0.3;
    const maxY = window.innerHeight * 0.2;
    btn.style.transform = `translate(${(Math.random()-0.5)*maxX}px, ${(Math.random()-0.5)*maxY}px)`;
    setTimeout(() => { btn.style.transform = ''; }, 700);

    // Update sad emoji in card as preview
    document.getElementById('questionEmoji').textContent = getSadEmoji(noCount);
  }

  function clickYes(btn) {
    spawnSparkles(12);
    const sad = document.getElementById('sadScale');
    const resultText = document.getElementById('resultText');
    const noCountText = document.getElementById('noCountText');

    sad.textContent = noCount === 0 ? '🥰' : (noCount >= 4 ? '😭💔' : getSadEmoji(noCount));

    if (noCount === 0) {
      resultText.textContent = 'I knew you loved me! 💕';
      sad.textContent = '🥰';
      noCountText.textContent = '';
    } else {
      resultText.textContent = `You clicked No ${noCount} time${noCount>1?'s':''}… and I knew you loved me 💔`;
      // Make it sadder per no click
      const sadMessages = [
        '',
        '(you made me a little sad 🥺)',
        '(you made me cry a little 😢)',
        '(my heart broke a tiny bit 💔)',
        '(I was devastated… 😭💔)',
        '(I almost gave up on us 😭😭)',
      ];
      noCountText.textContent = sadMessages[Math.min(noCount, sadMessages.length-1)];
    }

    showScreen('screen-result');
  }

  function goToHowMuch() {
    spawnSparkles(8);
    showScreen('screen-howmuch');
  }

  function pickAnswer(answer) {
    spawnSparkles(14);
    spawnHearts();

    const finalEmoji = document.getElementById('finalEmoji');
    const finalText  = document.getElementById('finalText');
    const finalSub   = document.getElementById('finalSub');

    const responses = {
      'A lot 🌸':    { emoji: '🌸💖', text: '"A lot" — that means the world to me!', sub: 'Every "a lot" from you feels like a garden of tulips in full bloom. 🌷' },
      'Very much 💝':{ emoji: '💝✨', text: '"Very much" — my heart is so full!',    sub: 'Very much is more than enough — it is everything. 💕' },
      'Sooo much 🌷':{ emoji: '🌷🌷', text: '"Sooo much" — that is my favourite!',   sub: 'Sooo much love deserves sooo many tulips just for you. 🌷🌷🌷' },
      'All 🫶':       { emoji: '🫶💞', text: '"All" — you give me everything!',       sub: '"All" is infinite, and you are infinite to me. 💞' },
    };

    const r = responses[answer] || { emoji: '💕', text: 'I love you too!', sub: 'Always and forever. 💕' };
    finalEmoji.textContent = r.emoji;
    finalText.textContent  = r.text;
    finalSub.textContent   = r.sub;

    showScreen('screen-final');
  }
</script>
</body>
</html>
